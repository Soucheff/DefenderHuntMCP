services:
  defender-hunt-mcp:
    build:
      context: .
    image: defender-hunt-mcp:local
    init: true
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - path: .env
        required: true
    ports:
      - "${MCP_PORT:-8000}:8000"
    environment:
      AZURE_CLIENT_CERTIFICATE_PATH: /run/secrets/obo-certificate.pem
      CACHE_BACKEND: redis
      REDIS_URL: redis://redis:6379/0
      REDIS_KEY_PREFIX: defender-hunt:dev
    volumes:
      - ./.local/entra-certs/obo.pem:/run/secrets/obo-certificate.pem:ro
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --save
      - ""
      - --appendonly
      - "no"
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - allkeys-lru
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    read_only: true
    tmpfs:
      - /data:size=32m,mode=0700
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true