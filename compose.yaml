services:
  defender-hunt-mcp:
    build:
      context: .
    image: defender-hunt-mcp:local
    init: true
    restart: unless-stopped
    env_file:
      - path: .env
        required: true
    ports:
      - "${MCP_PORT:-8000}:8000"
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true